task_type: api_integration
version: v1
created_at: "2026-03-17"
success_rate: null
description: "Template for integrating external APIs and services"

sections:
  - name: task
    content: |
      ## Task
      Integrate API/service: {{task_description}}
    required: true

  - name: context
    content: |
      ## Project Context
      Working directory: {{working_dir}}
      {{#if claude_md}}CLAUDE.md contents: {{claude_md}}{{/if}}
      {{#if file_tree}}Existing codebase: {{file_tree}}{{/if}}
      {{#if api_docs}}API documentation: {{api_docs}}{{/if}}
    required: true

  - name: requirements
    content: |
      ## Requirements
      - Service: {{service_name|default:"External API"}}
      - Endpoints needed: {{endpoints|default:"As specified in task description"}}
      - Authentication: {{auth_method|default:"API key in environment variable"}}
      - Error handling: retry on 5xx, raise on 4xx, log all errors
      - Rate limiting: respect API rate limits
      - Store API keys in environment variables, never in code
    required: true

  - name: constraints
    content: |
      ## Constraints
      {{constraints|default:"No specific constraints"}}
      - Never hardcode API keys or secrets
      - Use async HTTP client (httpx) for non-blocking calls
      - Add timeout handling (default 30s)
      - Graceful degradation if API is unavailable
    required: false

  - name: acceptance_criteria
    content: |
      ## Acceptance Criteria
      - [ ] API calls work with valid credentials
      - [ ] Error handling covers timeout, 4xx, 5xx scenarios
      - [ ] API keys read from environment variables
      - [ ] No secrets in source code
      - [ ] Integration tested with real or mock API
      - [ ] Rate limiting respected
      {{additional_criteria}}
    required: true
