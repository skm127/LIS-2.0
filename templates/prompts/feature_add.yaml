task_type: feature_add
version: v1
created_at: "2026-03-17"
success_rate: null
description: "Template for adding new features to existing codebases"

sections:
  - name: task
    content: |
      ## Task
      Add a new feature: {{task_description}}
    required: true

  - name: context
    content: |
      ## Project Context
      Working directory: {{working_dir}}
      {{#if claude_md}}CLAUDE.md contents: {{claude_md}}{{/if}}
      {{#if file_tree}}Existing codebase structure: {{file_tree}}{{/if}}
      {{#if existing_patterns}}Existing code patterns to follow: {{existing_patterns}}{{/if}}
    required: true

  - name: requirements
    content: |
      ## Requirements
      - Feature description: {{feature_description}}
      - Integration points: {{integration_points|default:"Integrate with existing codebase naturally"}}
      - Follow existing code style and patterns
      - Include appropriate error handling
      - Add any needed dependencies to requirements/package files
    required: true

  - name: constraints
    content: |
      ## Constraints
      {{constraints|default:"No specific constraints"}}
      - Must not break existing functionality
      - Follow the project's existing architecture patterns
      - Keep changes focused — don't refactor unrelated code
    required: false

  - name: acceptance_criteria
    content: |
      ## Acceptance Criteria
      - [ ] Feature works as described
      - [ ] Integrated cleanly with existing code
      - [ ] No import errors or runtime crashes
      - [ ] Existing tests still pass
      - [ ] New code follows project conventions
      {{additional_criteria}}
    required: true
