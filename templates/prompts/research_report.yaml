task_type: research_report
version: v1
created_at: "2026-03-17"
success_rate: null
description: "Template for research and analysis tasks"

sections:
  - name: task
    content: |
      ## Task
      Research and report on: {{task_description}}
    required: true

  - name: context
    content: |
      ## Context
      Working directory: {{working_dir}}
      {{#if background}}Background: {{background}}{{/if}}
      {{#if related_projects}}Related projects: {{related_projects}}{{/if}}
    required: true

  - name: requirements
    content: |
      ## Requirements
      - Topic: {{topic}}
      - Depth: {{depth|default:"comprehensive overview"}}
      - Format: {{format|default:"structured summary with key findings"}}
      - Include sources and references where possible
      - Provide actionable recommendations
      - Compare alternatives if applicable
    required: true

  - name: constraints
    content: |
      ## Constraints
      {{constraints|default:"No specific constraints"}}
      - Be objective — present pros and cons
      - Cite sources when making claims
      - Clearly distinguish facts from opinions
    required: false

  - name: acceptance_criteria
    content: |
      ## Acceptance Criteria
      - [ ] Topic is thoroughly covered
      - [ ] Key findings are clearly stated
      - [ ] Sources are referenced
      - [ ] Recommendations are actionable
      - [ ] Report is well-structured and readable
      {{additional_criteria}}
    required: true
